<div class="backdrop visually-hidden">
    <div class="modal">

        <button class="modal-close" type="button">
            <svg width="18" height="18">
                 <use href="/img/icons.svg#close"></use>
            </svg>
        </button>

        <h2 class="modal-title">
            Залишіть заявку на знайомство
        </h2>

        <form class="modal-form">

            <div class="modal-field">
                <label class="modal-label" for="name">Ім’я*</label>
                <input type="text" id="name" class="modal-input" placeholder="Андрій" required>
                <span class="error-message"></span>
            </div>
            
            <div class="modal-field">
                <label class="modal-label" for="phone">Телефон*</label>
                <input type="tel" id="phone" class="modal-input" placeholder="380955559922" required pattern="\d{12}">
                <span class="error-message">Введіть номер формату: +380955559922</span>
            </div>

            <div class="modal-field">
                <label class="modal-label" for="comment">Коментар</label>
                <textarea id="comment" class="modal-textarea" placeholder="Напишіть ваш коментар"></textarea>
            </div>

            <button type="submit" class="submit-btn">Надіслати</button>

        </form>

    </div>
</div>
